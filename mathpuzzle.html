<!DOCTYPE html>
<html>
<head>
<title>Math Puzzle - Mind Sharpener</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:linear-gradient(to right,#74ebd5,#acb6e5);
}

.container{
    margin-top:100px;
}

h1{
    color:#222;
}

#puzzle{
    font-size:28px;
    margin:20px;
}

input{
    padding:10px;
    font-size:18px;
    width:120px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin-top:10px;
    cursor:pointer;
}

#result{
    font-size:20px;
    margin-top:15px;
}

#score{
    font-size:18px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 Math Puzzle Game</h1>

<div id="puzzle"></div>

<input type="number" id="answer" placeholder="Answer">

<br>

<button onclick="check()">Submit</button>

<div id="result"></div>

<div id="score">Score: 0</div>

</div>

<script>

let num1, num2, operator, correctAnswer;
let score = 0;

function newPuzzle(){

num1 = Math.floor(Math.random()*20)+1;
num2 = Math.floor(Math.random()*20)+1;

let ops = ["+","-","*"];
operator = ops[Math.floor(Math.random()*3)];

if(operator=="+") correctAnswer = num1 + num2;
if(operator=="-") correctAnswer = num1 - num2;
if(operator=="*") correctAnswer = num1 * num2;

document.getElementById("puzzle").innerHTML =
num1 + " " + operator + " " + num2 + " = ?";
}

function check(){

let user = document.getElementById("answer").value;

if(user == correctAnswer){
document.getElementById("result").innerHTML="✅ Correct!";
score++;
}else{
document.getElementById("result").innerHTML="❌ Wrong! Correct answer: "+correctAnswer;
}

document.getElementById("score").innerHTML="Score: "+score;

document.getElementById("answer").value="";

newPuzzle();

}

newPuzzle();

</script>

</body>
  </html>
