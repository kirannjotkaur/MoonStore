<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7 Days Business Ebook</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
font-family:'Poppins',sans-serif;
}

/* Background Glow */
body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:#8a2be2;
filter:blur(220px);
top:-150px;
left:-150px;
opacity:0.4;
}

/* Cover */
.cover{
width:400px;
height:600px;
padding:35px;
border-radius:20px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 30px 80px rgba(0,0,0,0.7);
text-align:center;
position:relative;
overflow:hidden;
}

/* Glow Overlay */
.cover::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,#8a2be220,transparent);
}

/* Logo */
.logo img{
width:180px;
}

/* Tag */
.tag{
margin-top:15px;
display:inline-block;
padding:6px 14px;
background:#8a2be2;
border-radius:20px;
font-size:12px;
font-weight:600;
}

/* Big Title */
.title{
margin-top:30px;
font-size:34px;
font-weight:800;
line-height:1.3;
}

.title span{
color:#8a2be2;
}

/* Divider */
.line{
width:80px;
height:3px;
background:#8a2be2;
margin:20px auto;
}

/* Subtitle */
.subtitle{
font-size:14px;
color:#ccc;
line-height:1.6;
}

/* Feature Points */
.points{
margin-top:20px;
font-size:13px;
color:#aaa;
line-height:1.8;
}

.points span{
color:#8a2be2;
}

/* Author */
.author{
position:absolute;
bottom:25px;
width:100%;
left:0;
font-size:14px;
color:#aaa;
}

/* Hover preview */
.cover:hover{
transform:scale(1.04);
transition:0.4s;
}

</style>
</head>

<body>

<div class="cover">

    <div class="logo">
        <img src="IMG_20260314_001418_083.webp">
    </div>

    <div class="tag">BEGINNER TO EARNER</div>

    <div class="title">
        <span>7 Days</span><br>
        7 Business Ideas
    </div>

    <div class="line"></div>

    <div class="subtitle">
        Start your first online income with 7 proven business ideas — each with complete execution steps.
    </div>

    <div class="points">
        ✔ <span>No Investment Needed</span><br>
        ✔ <span>Step-by-Step Execution</span><br>
        ✔ <span>Beginner Friendly</span><br>
        ✔ <span>Real Earning Methods</span>
    </div>

    <div class="author">
        By Bright Future CEO 🚀
    </div>

</div>

</body>

</html>
