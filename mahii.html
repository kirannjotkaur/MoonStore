<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* floating particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#ffffff22 1px,transparent 1px);
background-size:60px 60px;
animation:move 30s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

.container{
text-align:center;
max-width:700px;
padding:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,0.1);
z-index:1;
}

h1{
font-size:2.8rem;
letter-spacing:2px;
margin-bottom:30px;
color:#ffffff;
}

.names{
display:flex;
justify-content:space-around;
margin:30px 0;
}

.name{
font-size:1.4rem;
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,0.08);
transition:0.3s;
cursor:pointer;
}

.name:hover{
transform:translateY(-6px) scale(1.1);
background:#ffffff22;
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.heart{
font-size:40px;
margin:20px 0;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.message{
margin-top:20px;
font-size:1.1rem;
opacity:0.8;
min-height:30px;
}

.footer{
margin-top:30px;
opacity:0.6;
font-style:italic;
}

</style>
</head>

<body>

<div class="container">

<h1>You & We</h1>

<div class="names">
<div class="name">Mahi</div>
<div class="name">Kiran</div>
<div class="name">Aditya</div>
</div>

<div class="heart">❤️</div>

<div class="message" id="typing"></div>

<div class="footer">Some memories never disappear.</div>

</div>

<script>

const text = "Best Group • Soul Mates • Lovely Buddies";
let i = 0;

function type(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(type,50);
}
}

type();

</script>

</body>
</html>
