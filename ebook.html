<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bright Future Ebook</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eaeaea;
    font-family: 'Poppins', sans-serif;
}

/* Cover */
.cover {
    width:360px;
    height:560px;
    background:#ffffff;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    padding:25px;
    position:relative;
    text-align:center;
}

/* Logo */
.logo img {
    width:220px;
    margin-top:10px;
}

/* Title */
.title {
    margin-top:40px;
    font-size:24px;
    font-weight:700;
    color:#0e2f28;
    line-height:1.4;
}

/* Subtitle */
.subtitle {
    margin-top:15px;
    font-size:14px;
    color:#555;
    line-height:1.6;
    padding:0 10px;
}

/* Divider line */
.line {
    width:60px;
    height:3px;
    background:#0e2f28;
    margin:20px auto;
    border-radius:2px;
}

/* Author */
.author {
    position:absolute;
    bottom:25px;
    width:100%;
    left:0;
    font-size:14px;
    color:#333;
    font-weight:500;
}
</style>
</head>

<body>

<div class="cover">

    <!-- Your Logo -->
    <div class="logo">
        <img src="IMG_20260314_001418_083.webp">
    </div>

    <!-- Title -->
    <div class="title">
        Build Your First Online Income
    </div>

    <div class="line"></div>

    <!-- Subtitle -->
    <div class="subtitle">
        A beginner-friendly guide to start earning money online using simple and proven methods.
    </div>

    <!-- Author -->
    <div class="author">
        By Bright Future CEO
    </div>

</div>

</body>
</html>
